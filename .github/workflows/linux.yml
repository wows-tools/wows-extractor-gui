name: Linux Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
    branches: [main]

concurrency:
  group: '${{ github.workflow }}-${{ github.head_ref || github.ref_name }}'
  cancel-in-progress: true

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-latest
    # Minimal official Ubuntu rootfs (Docker Hub has no ubuntu:slim tag).
    container:
      image: ubuntu:latest

    steps:
      - name: Install git (required before actions/checkout in bare Ubuntu)
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends git ca-certificates

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          set -eux
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            gh \
            cmake \
            ninja-build \
            build-essential \
            pkg-config \
            zlib1g-dev \
            libpcre2-dev \
            libpython3-dev \
            python3-dev \
            libtinygltf-dev \
            libmeshoptimizer-dev \
            libgl-dev \
            libvulkan-dev \
            libxkbcommon-dev \
            libgles2-mesa-dev \
            qt6-base-dev \
            qt6-declarative-dev \
            qt6-quick3d-dev

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory '*'
          git submodule update --init wows-depack wows-model-exporter
          git -C wows-model-exporter submodule update --init deps/stb

      - name: Configure
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build --parallel

      - name: Install to staging
        run: cmake --install build --prefix "${{ github.workspace }}/staging"

      - name: Determine version
        id: version
        run: |
          v=$(grep -oP 'project\([^)]*VERSION\s+\K[\d.]+' CMakeLists.txt | head -1)
          echo "version=$v" >> $GITHUB_OUTPUT

      - name: Create tarball
        run: |
          tar czf "${{ github.workspace }}/wows-extractor-${{ steps.version.outputs.version }}-linux-x64.tar.gz" \
            -C "${{ github.workspace }}/staging" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wows-extractor-${{ steps.version.outputs.version }}-linux-x64
          path: "${{ github.workspace }}/*.tar.gz"
          if-no-files-found: error

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "${{ github.workspace }}/wows-extractor-${{ steps.version.outputs.version }}-linux-x64.tar.gz" \
            --clobber
